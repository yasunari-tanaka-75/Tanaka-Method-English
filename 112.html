<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>田中メソッド・判定テスト (41-80)</title>
    <style>
        body { font-family: 'Meiryo', sans-serif; text-align: center; background-color: #f5f5dc; padding: 20px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; }
        #display-area { 
            background: white; height: 450px; margin: 20px auto; width: 100%; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            display: flex; justify-content: space-around; align-items: center; 
            border: 6px solid #3498db; padding: 20px; position: relative;
        }
        .box { width: 48%; }
        #meaning { font-size: 70px; font-weight: bold; color: #2c3e50; }
        #word-area { font-size: 75px; font-weight: bold; color: #e74c3c; line-height: 1.1; }
        #progress { position: absolute; bottom: 20px; width: 100%; font-size: 24px; color: #34495e; font-weight: bold; }
        .controls { margin: 20px; padding: 20px; background: #fff; border-radius: 15px; border: 2px solid #3498db; display: flex; align-items: center; }
        .control-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .control-right { text-align: right; border-left: 2px dashed #bdc3c7; padding-left: 30px; min-width: 250px; }
        .time-display { font-size: 45px; font-weight: bold; color: #c0392b; font-family: 'Courier New', monospace; }
        .judge-number { color: #2980b9; font-size: 45px; margin: 0 10px; min-width: 50px; text-align: center; }
        button { font-size: 18px; padding: 12px 24px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 10px; margin: 5px; font-weight: bold; }
        .btn-test { background: #e67e22; }
        .btn-mode { background: #34495e; width: 100%; height: 50px; }
        .btn-stop { background: #95a5a6; }
        .btn-voice-select { background: #7f8c8d; font-size: 14px; padding: 8px 15px; }
        .mode-active { background-color: #2c3e50 !important; color: #f1c40f !important; border: 2px solid #f1c40f; }
        .voice-active { background-color: #27ae60 !important; }
        #test-options { margin-top: 15px; display: none; width: 95%; display: flex; gap: 20px; background: #ecf0f1; padding: 20px; border-radius: 15px; }
        .part-left { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .part-right { flex: 3; border-left: 1px solid #bdc3c7; padding-left: 20px; display: flex; align-items: center; }
        #kb-input { font-size: 24px; padding: 10px; width: 90%; border-radius: 10px; border: 2px solid #3498db; }
    </style>
</head>
<body>
<div class="container">
    <h1>田中メソッド・判定テスト (41-80)</h1>
    <div class="controls">
        <div class="control-left">
            <div style="margin-bottom: 10px; font-weight: bold;">
                スピード選択 (1語あたり):
                <select id="level-select" style="font-size: 18px; padding: 8px;">
                    <option value="2.0">1級 (2.0s)</option>
                    <option value="2.5">2級 (2.5s)</option>
                    <option value="3.0">3級 (3.0s)</option>
                    <option value="3.5">4級 (3.5s)</option>
                    <option value="4.0">5級 (4.0s)</option>
                    <option value="4.5">6級 (4.5s)</option>
                    <option value="5.0">7級 (5.0s)</option>
                    <option value="5.5">8級 (5.5s)</option>
                    <option value="6.0">9級 (6.0s)</option>
                    <option value="6.5" selected>10級 (6.5s)</option>
                </select>
            </div>
            <div class="voice-controls">
                <button id="v-off" class="btn-voice-select voice-active" onclick="setVoiceMode('off')">VOICE OFF</button>
                <button id="v-male" class="btn-voice-select" onclick="setVoiceMode('male')">Male</button>
                <button id="v-female" class="btn-voice-select" onclick="setVoiceMode('female')">Female</button>
            </div>
            <div style="margin-top: 10px;">
                <button onclick="startTraining()">トレーニング開始</button>
                <button class="btn-test" onclick="toggleTestMenu()">40問連続判定テスト</button>
                <button class="btn-stop" onclick="stopAll()">停止</button>
            </div>
            <div id="test-options">
                <div class="part-left">
                    <button id="mode-voice" class="btn-mode" onclick="initMic()">英語発音判定</button>
                    <button id="mode-kb" class="btn-mode" onclick="setKeyboard()">スペル入力判定</button>
                </div>
                <div class="part-right">
                    <input type="text" id="kb-input" placeholder="1問目を打って開始" onkeydown="handleKbInput(event)" disabled>
                </div>
            </div>
        </div>
        <div class="control-right">
            <div class="time-display" id="timer">00.00</div>
            <div style="font-size: 24px; font-weight: bold;">判定<span id="judge-num" class="judge-number">--</span>級</div>
        </div>
    </div>
    <div id="display-area">
        <div class="box"><div id="meaning">READY</div></div>
        <div class="box"><div id="word-area">---</div></div>
        <div id="progress">0 / 40</div>
    </div>
</div>

<script>
    // 提供された全ての単語(41-80)を格納
    const masterWords = [
        {id:41, eng:"brain", jpn:"脳"}, {id:42, eng:"mind", jpn:"心"}, {id:43, eng:"language", jpn:"言語"}, {id:44, eng:"thought", jpn:"考え"}, {id:45, eng:"knowledge", jpn:"知識"},
        {id:46, eng:"skill", jpn:"技術"}, {id:47, eng:"technology", jpn:"科学技術"}, {id:48, eng:"culture", jpn:"文化"}, {id:49, eng:"experience", jpn:"経験"}, {id:50, eng:"result", jpn:"結果"},
        {id:51, eng:"reason", jpn:"理由"}, {id:52, eng:"cause", jpn:"原因"}, {id:53, eng:"effect", jpn:"影響・効果"}, {id:54, eng:"matter", jpn:"問題・事柄"}, {id:55, eng:"sense", jpn:"感覚・意味"},
        {id:56, eng:"way", jpn:"方法・道"}, {id:57, eng:"term", jpn:"期間・用語"}, {id:58, eng:"situation", jpn:"状況"}, {id:59, eng:"condition", jpn:"状態・条件"}, {id:60, eng:"position", jpn:"位置・立場"},
        {id:61, eng:"environment", jpn:"環境"}, {id:62, eng:"nature", jpn:"自然"}, {id:63, eng:"research", jpn:"調査・研究"}, {id:64, eng:"rule", jpn:"規則・支配"}, {id:65, eng:"interest", jpn:"興味・利害"},
        {id:66, eng:"value", jpn:"価値"}, {id:67, eng:"view", jpn:"意見・眺め"}, {id:68, eng:"sound", jpn:"音"}, {id:69, eng:"form", jpn:"形・用紙"}, {id:70, eng:"case", jpn:"場合・事例"},
        {id:71, eng:"role", jpn:"役割"}, {id:72, eng:"age", jpn:"年齢・時代"}, {id:73, eng:"care", jpn:"世話・注意"}, {id:74, eng:"risk", jpn:"危険・リスク"}, {id:75, eng:"human", jpn:"人間"},
        {id:76, eng:"free", jpn:"自由な・無料の"}, {id:77, eng:"sure", jpn:"確信して"}, {id:78, eng:"certain", jpn:"確信して・ある程度の"}, {id:79, eng:"main", jpn:"主要な"}, {id:80, eng:"major", jpn:"主要な・重大な"}
    ];

    let timerInterval = null, trainingInterval = null;
    let index = 0, startTime = 0, selectedMode = "", isRunning = false, voiceMode = "off";
    const synth = window.speechSynthesis;
    let voices = [];

    function loadVoices() { voices = synth.getVoices(); }
    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) speechSynthesis.onvoiceschanged = loadVoices;

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
        recognition.lang = 'en-US';
        recognition.continuous = true;
        recognition.onstart = () => { if (selectedMode === 'voice' && !isRunning) { document.getElementById('mode-voice').innerText = "判定中..."; document.getElementById('mode-voice').classList.add('mode-active'); executeTest(); } };
        recognition.onresult = (e) => { if (!isRunning || selectedMode !== "voice") return; checkAnswer(e.results[e.results.length - 1][0].transcript.trim().toLowerCase()); };
    }

    function setVoiceMode(mode) {
        voiceMode = mode;
        document.querySelectorAll('.btn-voice-select').forEach(btn => btn.classList.remove('voice-active'));
        document.getElementById('v-' + mode).classList.add('voice-active');
    }

    function toggleTestMenu() { stopAll(); document.getElementById('test-options').style.display = 'flex'; }
    function initMic() { selectedMode = "voice"; document.getElementById('kb-input').disabled = true; try { recognition.start(); } catch(e) { if (!isRunning) executeTest(); } }
    function setKeyboard() {
        selectedMode = "keyboard";
        if (recognition) try { recognition.stop(); } catch(e) {}
        document.getElementById('mode-voice').innerText = "英語発音判定";
        document.getElementById('mode-voice').classList.remove('mode-active');
        document.getElementById('mode-kb').classList.add('mode-active');
        document.getElementById('kb-input').disabled = false;
        document.getElementById('kb-input').focus();
        document.getElementById('meaning').innerText = masterWords[0].jpn;
        document.getElementById('progress').innerText = "41 / 80";
    }

    function executeTest() {
        index = 0; isRunning = true; startTime = Date.now();
        timerInterval = setInterval(() => { if (isRunning) document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2); }, 50);
        showStep(true);
    }

    function handleKbInput(e) {
        if (e.key === 'Enter') {
            const input = e.target.value.trim().toLowerCase();
            if (!isRunning && selectedMode === "keyboard") { if (input === masterWords[0].eng.toLowerCase()) { executeTest(); index = 1; showStep(true); } }
            else if (isRunning) { checkAnswer(input); }
            e.target.value = "";
        }
    }

    function checkAnswer(input) {
        if (!isRunning) return;
        if (input.includes(masterWords[index].eng.toLowerCase())) {
            index++;
            if (index >= 40) finishTest(); else showStep(true);
        }
    }

    function finishTest() {
        isRunning = false; clearInterval(timerInterval);
        const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
        document.getElementById('timer').innerText = finalTime;
        let base = selectedMode === 'keyboard' ? parseFloat(finalTime) / 3 : parseFloat(finalTime);
        document.getElementById('judge-num').innerText = calculateLevel40(base);
        document.getElementById('meaning').innerText = "合格！";
        document.getElementById('word-area').innerText = "FINISH";
        if (recognition) try { recognition.stop(); } catch(e) {}
    }

    function calculateLevel40(sec) {
        // 40問合計判定基準: 1級80s(2.0x40) 〜 10級260s(6.5x40)
        const thresholds = [80, 100, 120, 140, 160, 180, 200, 220, 240, 260];
        for (let i = 0; i < thresholds.length; i++) if (sec <= thresholds[i]) return i + 1;
        return "外";
    }

    function showStep(isTest) {
        const word = masterWords[index];
        document.getElementById('meaning').innerText = word.jpn;
        document.getElementById('progress').innerText = `${word.id} / 80`;
        document.getElementById('word-area').innerText = isTest ? "???" : word.eng;
        if (!isTest && voiceMode !== "off") speak(word.eng);
    }

    function startTraining() {
        stopAll(); index = 0; showStep(false);
        const speed = parseFloat(document.getElementById('level-select').value) * 1000;
        trainingInterval = setInterval(() => {
            index++;
            if (index >= 40) { clearInterval(trainingInterval); document.getElementById('meaning').innerText = "終了"; document.getElementById('word-area').innerText = "FINISH"; }
            else { showStep(false); }
        }, speed);
    }

    function stopAll() {
        isRunning = false; clearInterval(timerInterval); clearInterval(trainingInterval);
        if (recognition) try { recognition.stop(); } catch(e){}
        synth.cancel();
        document.getElementById('meaning').innerText = "READY";
        document.getElementById('word-area').innerText = "---";
        document.getElementById('progress').innerText = "0 / 80";
        document.getElementById('timer').innerText = "00.00";
        document.getElementById('judge-num').innerText = "--";
        document.getElementById('test-options').style.display = 'none';
        document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('mode-active'));
        document.getElementById('kb-input').disabled = true;
    }

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        let targetVoice = voices.find(v => v.lang.startsWith('en') && (voiceMode === 'male' ? (v.name.includes('Male') || v.name.includes('Guy')) : (v.name.includes('Female') || v.name.includes('Zira'))));
        if (targetVoice) utter.voice = targetVoice;
        synth.speak(utter);
    }
</script>
</body>
</html>
