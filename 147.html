<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>田中メソッド・判定テスト (541-600)</title>
    <style>
        body { font-family: 'Meiryo', sans-serif; text-align: center; background-color: #f5f5dc; padding: 20px; color: #2c3e50; }
        .container { max-width: 1000px; margin: 0 auto; }
        #display-area { 
            background: white; height: 450px; margin: 20px auto; width: 100%; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            display: flex; justify-content: space-around; align-items: center; 
            border: 6px solid #3498db; padding: 20px; position: relative;
        }
        .box { width: 48%; }
        #meaning { font-size: 60px; font-weight: bold; color: #2c3e50; }
        #word-area { font-size: 70px; font-weight: bold; color: #e74c3c; line-height: 1.1; }
        #progress-display { position: absolute; bottom: 20px; width: 100%; font-size: 30px; font-weight: bold; color: #7f8c8d; }
        .controls { margin: 20px; padding: 20px; background: #fff; border-radius: 15px; border: 2px solid #3498db; display: flex; align-items: center; }
        .control-left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .control-right { text-align: right; border-left: 2px dashed #bdc3c7; padding-left: 30px; min-width: 250px; }
        .time-display { font-size: 45px; font-weight: bold; color: #c0392b; font-family: 'Courier New', monospace; }
        .judge-number { color: #2980b9; font-size: 45px; margin: 0 10px; min-width: 50px; text-align: center; }
        button { font-size: 18px; padding: 12px 24px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 10px; margin: 5px; font-weight: bold; }
        .btn-test { background: #e67e22; }
        .btn-mode { background: #34495e; width: 100%; height: 50px; }
        .btn-stop { background: #95a5a6; } 
        .btn-voice-select { background: #7f8c8d; font-size: 14px; padding: 8px 15px; }
        .voice-active { background-color: #27ae60 !important; }
        #test-options { margin-top: 15px; display: none; width: 95%; gap: 20px; background: #ecf0f1; padding: 20px; border-radius: 15px; }
        .part-left { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        .part-right { flex: 3; border-left: 1px solid #bdc3c7; padding-left: 20px; display: flex; align-items: center; }
        #kb-input { font-size: 24px; padding: 10px; width: 90%; border-radius: 10px; border: 2px solid #3498db; }
        select { font-size: 16px; padding: 5px; border-radius: 5px; margin: 0 5px; }
    </style>
</head>
<body>
<div class="container">
    <h1>田中メソッド・判定テスト (541-600)</h1>
    <div class="controls">
        <div class="control-left">
            <div style="margin-bottom: 10px; font-weight: bold;">
                範囲: 
                <select id="range-select" onchange="stopAll()">
                    <option value="540-600">60問連続 (541-600)</option>
                    <option value="540-550">541-550</option>
                    <option value="550-560">551-560</option>
                    <option value="560-570">561-570</option>
                    <option value="570-580">571-580</option>
                    <option value="580-590">581-590</option>
                    <option value="590-600">591-600</option>
                </select>
                スピード基準:
                <select id="level-select">
                    <option value="2.0">1級 (0.5秒/語)</option>
                    <option value="2.5">2級</option>
                    <option value="3.0">3級</option>
                    <option value="3.5">4級</option>
                    <option value="4.0">5級</option>
                    <option value="4.5">6級</option>
                    <option value="5.0">7級</option>
                    <option value="5.5">8級</option>
                    <option value="6.0">9級</option>
                    <option value="6.5" selected>10級</option>
                </select>
            </div>
            <div class="voice-controls">
                <button id="v-off" class="btn-voice-select voice-active" onclick="setVoiceMode('off')">VOICE OFF</button>
                <button id="v-male" class="btn-voice-select" onclick="setVoiceMode('male')">Male</button>
                <button id="v-female" class="btn-voice-select" onclick="setVoiceMode('female')">Female</button>
            </div>
            <div style="margin-top: 10px;">
                <button onclick="startTraining()">トレーニング開始</button>
                <button class="btn-test" onclick="toggleTestMenu()">確認テスト選択</button>
                <button class="btn-stop" onclick="stopAll()">停止</button>
            </div>
            <div id="test-options">
                <div class="part-left">
                    <button id="mode-voice" class="btn-mode" onclick="initMic()">英語発音</button>
                    <button id="mode-kb" class="btn-mode" onclick="setKeyboard()">スペル入力</button>
                </div>
                <div class="part-right">
                    <input type="text" id="kb-input" placeholder="Enterで開始" onkeydown="handleKbInput(event)" disabled>
                </div>
            </div>
        </div>
        <div class="control-right">
            <div class="time-display" id="timer">00.00</div>
            <div style="font-size: 24px; font-weight: bold;">判定<span id="judge-num" class="judge-number">--</span>級</div>
        </div>
    </div>
    <div id="display-area">
        <div class="box"><div id="meaning">READY</div></div>
        <div class="box"><div id="word-area">---</div></div>
        <div id="progress-display">発音ナンバー <span id="current-id">---</span> / 600</div>
    </div>
</div>

<script>
    const masterWords = [
        {id:541, eng:"escape", jpn:"逃げる"}, {id:542, eng:"neighbor", jpn:"隣人"}, {id:543, eng:"household", jpn:"世帯・家庭"}, {id:544, eng:"resident", jpn:"居住者"}, {id:545, eng:"vehicle", jpn:"乗り物・車両"},
        {id:546, eng:"wheel", jpn:"車輪・ハンドル"}, {id:547, eng:"delay", jpn:"遅れ・～を遅らせる"}, {id:548, eng:"fuel", jpn:"燃料"}, {id:549, eng:"pollution", jpn:"汚染"}, {id:550, eng:"atmosphere", jpn:"大気・雰囲気"},
        {id:551, eng:"electricity", jpn:"電気"}, {id:552, eng:"cancer", jpn:"がん"}, {id:553, eng:"plague", jpn:"伝染病・疫病"}, {id:554, eng:"threat", jpn:"脅威・脅し"}, {id:555, eng:"flood", jpn:"洪水"},
        {id:556, eng:"earthquake", jpn:"地震"}, {id:557, eng:"disaster", jpn:"災害"}, {id:558, eng:"crisis", jpn:"危機"}, {id:559, eng:"victim", jpn:"犠牲者・被害者"}, {id:560, eng:"wealth", jpn:"富・財産"},
        {id:561, eng:"fund", jpn:"資金・基金"}, {id:562, eng:"capital", jpn:"資本・首都"}, {id:563, eng:"profit", jpn:"利益"}, {id:564, eng:"talent", jpn:"才能"}, {id:565, eng:"capacity", jpn:"能力・収容力"},
        {id:566, eng:"scholar", jpn:"学者"}, {id:567, eng:"tradition", jpn:"伝統"}, {id:568, eng:"literature", jpn:"文学"}, {id:569, eng:"lecture", jpn:"講義"}, {id:570, eng:"manner", jpn:"方法・行儀"},
        {id:571, eng:"symbol", jpn:"象徴・記号"}, {id:572, eng:"analysis", jpn:"分析"}, {id:573, eng:"version", jpn:"版・型"}, {id:574, eng:"perspective", jpn:"視点・見方"}, {id:575, eng:"vision", jpn:"視力・予見"},
        {id:576, eng:"sight", jpn:"光景・視力"}, {id:577, eng:"insight", jpn:"洞察（力）"}, {id:578, eng:"bilingual", jpn:"2か国語を話す"}, {id:579, eng:"capable", jpn:"能力がある"}, {id:580, eng:"willing", jpn:"～をいとわない"},
        {id:581, eng:"eager", jpn:"熱望して・熱心な"}, {id:582, eng:"amazing", jpn:"驚くべき"}, {id:583, eng:"calm", jpn:"落ち着いた・静かな"}, {id:584, eng:"quiet", jpn:"静かな・平穏な"}, {id:585, eng:"senior", jpn:"上位の・年上の"},
        {id:586, eng:"elderly", jpn:"年配の"}, {id:587, eng:"firm", jpn:"堅い・会社"}, {id:588, eng:"severe", jpn:"厳しい・深刻な"}, {id:589, eng:"tough", jpn:"たくましい・困難な"}, {id:590, eng:"rapid", jpn:"急速な・速い"},
        {id:591, eng:"immediate", jpn:"即座の・直接の"}, {id:592, eng:"vast", jpn:"広大な・莫大な"}, {id:593, eng:"enormous", jpn:"巨大な・莫大な"}, {id:594, eng:"broad", jpn:"広い・広範囲な"}, {id:595, eng:"narrow", jpn:"狭い・細い"},
        {id:596, eng:"tiny", jpn:"とても小さい"}, {id:597, eng:"efficient", jpn:"効率的な"}, {id:598, eng:"constant", jpn:"絶え間ない・一定の"}, {id:599, eng:"nearby", jpn:"近くの・近くに"}, {id:600, eng:"distant", jpn:"遠い・離れた"}
    ];

    let currentList = [];
    let timerInterval = null, trainingInterval = null;
    let index = 0, startTime = 0, isRunning = false, selectedMode = "", voiceMode = "off";
    const synth = window.speechSynthesis;
    let availableVoices = [];

    function loadVoices() { availableVoices = synth.getVoices(); }
    if (speechSynthesis.onvoiceschanged !== undefined) { speechSynthesis.onvoiceschanged = loadVoices; }
    loadVoices();

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
        recognition.lang = 'en-US';
        recognition.continuous = true;
        recognition.onresult = (e) => {
            if (!isRunning || selectedMode !== "voice") return;
            const text = e.results[e.results.length - 1][0].transcript.trim().toLowerCase();
            checkAnswer(text);
        };
    }

    function setVoiceMode(mode) {
        voiceMode = mode;
        document.querySelectorAll('.btn-voice-select').forEach(btn => btn.classList.remove('voice-active'));
        document.getElementById(`v-${mode}`).classList.add('voice-active');
    }

    function updateCurrentList() {
        const range = document.getElementById('range-select').value.split('-');
        const start = parseInt(range[0]);
        const end = parseInt(range[1]);
        currentList = masterWords.filter(w => w.id > start && w.id <= end);
    }

    function toggleTestMenu() { stopAll(); document.getElementById('test-options').style.display = 'flex'; }

    function initMic() {
        stopAll();
        selectedMode = "voice";
        document.getElementById('kb-input').disabled = true;
        updateCurrentList();
        try { recognition.start(); } catch(e) {}
        executeTest();
    }

    function setKeyboard() {
        stopAll();
        selectedMode = "keyboard";
        updateCurrentList();
        document.getElementById('kb-input').disabled = false;
        document.getElementById('kb-input').focus();
        document.getElementById('meaning').innerText = currentList[0].jpn;
        document.getElementById('word-area').innerText = "---";
        document.getElementById('current-id').innerText = currentList[0].id;
    }

    function executeTest() {
        index = 0; isRunning = true; startTime = Date.now();
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            document.getElementById('timer').innerText = ((Date.now() - startTime) / 1000).toFixed(2);
        }, 50);
        showStep(true);
    }

    function handleKbInput(e) {
        if (e.key === 'Enter') {
            const input = e.target.value.trim().toLowerCase();
            if (!isRunning) executeTest();
            else checkAnswer(input);
            e.target.value = "";
        }
    }

    function checkAnswer(input) {
        if (input.includes(currentList[index].eng.toLowerCase())) {
            index++;
            if (index >= currentList.length) finishTest();
            else showStep(true);
        }
    }

    function finishTest() {
        isRunning = false;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        const finalTime = parseFloat(document.getElementById('timer').innerText);
        const normalizedTime = (finalTime / currentList.length) * 10;
        document.getElementById('judge-num').innerText = calculateLevel(normalizedTime);
        document.getElementById('meaning').innerText = "合格！";
        document.getElementById('word-area').innerText = "FINISH";
        if (recognition) try { recognition.stop(); } catch(e) {}
    }

    function calculateLevel(sec) {
        const thresholds = [20, 25, 30, 35, 40, 45, 50, 55, 60, 65];
        for (let i = 0; i < thresholds.length; i++) if (sec <= thresholds[i]) return i + 1;
        return "外";
    }

    function showStep(isTest) {
        const word = currentList[index];
        document.getElementById('meaning').innerText = word.jpn;
        document.getElementById('word-area').innerText = isTest ? "???" : word.eng;
        document.getElementById('current-id').innerText = word.id;
        if (!isTest && voiceMode !== "off") speak(word.eng);
    }

    function startTraining() {
        stopAll();
        updateCurrentList();
        index = 0;
        showStep(false);
        const speed = parseFloat(document.getElementById('level-select').value) * 1000;
        trainingInterval = setInterval(() => {
            index++;
            if (index >= currentList.length) {
                if (trainingInterval) { clearInterval(trainingInterval); trainingInterval = null; }
                document.getElementById('meaning').innerText = "終了";
                document.getElementById('word-area').innerText = "FINISH";
            } else showStep(false);
        }, speed);
    }

    function stopAll() {
        isRunning = false;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        if (trainingInterval) { clearInterval(trainingInterval); trainingInterval = null; }
        if (recognition) { try { recognition.stop(); } catch(e) {} }
        synth.cancel();
        
        document.getElementById('test-options').style.display = 'none';
        document.getElementById('meaning').innerText = "READY";
        document.getElementById('word-area').innerText = "---";
        document.getElementById('timer').innerText = "00.00";
        document.getElementById('judge-num').innerText = "--";
        document.getElementById('current-id').innerText = "---";
        document.getElementById('kb-input').disabled = true;
        document.getElementById('kb-input').value = "";
    }

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        let targetVoice = null;
        if (voiceMode === 'male') {
            targetVoice = availableVoices.find(v => (v.lang === 'en-US' || v.lang === 'en-GB') && (v.name.includes('Male') || v.name.includes('David') || v.name.includes('Guy')));
        } else if (voiceMode === 'female') {
            targetVoice = availableVoices.find(v => (v.lang === 'en-US' || v.lang === 'en-GB') && (v.name.includes('Female') || v.name.includes('Zira') || v.name.includes('Samantha')));
        }
        if (targetVoice) utter.voice = targetVoice;
        synth.speak(utter);
    }
</script>
</body>
</html>
